<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduConnect - App Mobile</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="EduConnect">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .app-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        
        .app-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
        }
        
        h1 {
            color: #1e293b;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        p {
            color: #64748b;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .btn {
            background: #3b82f6;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #f1f5f9;
            color: #64748b;
        }
        
        .btn-secondary:hover {
            background: #e2e8f0;
        }
        
        .instructions {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
            text-align: left;
        }
        
        .instructions h3 {
            color: #1e293b;
            margin-bottom: 15px;
        }
        
        .instructions ol {
            color: #64748b;
            padding-left: 20px;
        }
        
        .instructions li {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-icon">🎓</div>
        <h1>EduConnect</h1>
        <p>Sistema de Agendamento de Cursos</p>
        
        <a href="http://localhost:8080/Sistema%20De%20Agendamento/public/" class="btn" target="_blank">
            📱 Abrir App
        </a>
        
        <a href="http://localhost:8080/Sistema%20De%20Agendamento/public/dashboard_final.php" class="btn btn-secondary" target="_blank">
            🖥️ Dashboard Completo
        </a>
        
        <div class="instructions">
            <h3>📱 Como Instalar no Celular:</h3>
            <ol>
                <li>Abra o link no seu celular</li>
                <li>Clique nos 3 pontos (⋮)</li>
                <li>Selecione "Adicionar à tela inicial"</li>
                <li>Confirme a instalação</li>
                <li>Pronto! Agora é um app!</li>
            </ol>
        </div>
    </div>
    
    <script>
        // Detectar se é mobile
        if (/Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            document.querySelector('.app-container').style.maxWidth = '100%';
            document.querySelector('.app-container').style.borderRadius = '0';
            document.querySelector('.app-container').style.margin = '0';
        }
        
        // Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(registration => console.log('PWA registrado'))
                .catch(error => console.log('Erro PWA:', error));
        }
    </script>
</body>
</html>

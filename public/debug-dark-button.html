<!DOCTYPE html>
<html lang="pt-BR" class="dark-mode-init">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEBUG - Botão Dark Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="dark-mode.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            background: #f5f5f5;
            color: #333;
            font-family: 'Courier New', monospace;
            padding: 20px;
            transition: all 0.35s ease;
        }
        
        html.dark-mode, body.dark-mode {
            background: #0f172a;
            color: #f8fafc;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .header {
            position: relative;
            padding: 20px;
            background: white;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        html.dark-mode .header, body.dark-mode .header {
            background: #1e293b;
        }
        
        .console {
            background: #1a1a1a;
            color: #00ff00;
            border-radius: 8px;
            padding: 15px;
            font-size: 12px;
            overflow-y: auto;
            max-height: 400px;
            margin: 20px 0;
        }
        
        .console .log { margin: 3px 0; }
        .console .success { color: #10b981; }
        .console .error { color: #ef4444; }
        .console .info { color: #3b82f6; }
        
        .test-section {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        
        html.dark-mode .test-section, body.dark-mode .test-section {
            background: #1e293b;
        }
        
        button {
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }
        
        button:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 DEBUG - Botão Dark Mode</h1>
        
        <div class="header">
            <h2>Botão ao vivo (teste):</h2>
            <p style="margin: 10px 0; font-size: 12px; opacity: 0.8;">Clique para testar:</p>
            <button id="darkModeToggle" title="Alternar tema" aria-label="Alternar Dark Mode">
                <i class="fas fa-moon"></i>
            </button>
        </div>
        
        <div class="test-section">
            <h3>Console de Debug:</h3>
            <div class="console" id="debugConsole">
                <div class="log info">[INIT] Página carregada</div>
            </div>
        </div>
        
        <div class="test-section">
            <h3>Testes Manuais:</h3>
            <button onclick="testDarkModeToggle()">Testar Toggle Manualmente</button>
            <button onclick="testButtonElement()">Verificar Elemento do Botão</button>
            <button onclick="testCSSClasses()">Verificar Classes CSS</button>
            <button onclick="clearConsole()">Limpar Console</button>
        </div>
    </div>
    
    <script>
        function log(message, type = 'log') {
            const console = document.getElementById('debugConsole');
            const line = document.createElement('div');
            line.className = `log ${type}`;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            console.appendChild(line);
            console.scrollTop = console.scrollHeight;
        }
        
        function testDarkModeToggle() {
            log('→ testDarkModeToggle() chamado', 'info');
            const body = document.body;
            const currentState = body.classList.contains('dark-mode');
            
            if (body.classList.toggle('dark-mode')) {
                log('✓ Dark Mode ATIVADO', 'success');
            } else {
                log('✓ Dark Mode DESATIVADO', 'success');
            }
        }
        
        function testButtonElement() {
            log('→ testButtonElement() chamado', 'info');
            const btn = document.getElementById('darkModeToggle');
            
            if (!btn) {
                log('✗ ERRO: Botão #darkModeToggle não encontrado!', 'error');
                return;
            }
            
            log(`✓ Botão encontrado`, 'success');
            log(`  - ID: ${btn.id}`, 'info');
            log(`  - Classes: ${btn.className || 'nenhuma'}`, 'info');
            log(`  - innerHTML: ${btn.innerHTML}`, 'info');
            log(`  - Tamanho computado: ${getComputedStyle(btn).width} x ${getComputedStyle(btn).height}`, 'info');
            log(`  - Position: ${getComputedStyle(btn).position}`, 'info');
        }
        
        function testCSSClasses() {
            log('→ testCSSClasses() chamado', 'info');
            const btn = document.getElementById('darkModeToggle');
            
            if (!btn) {
                log('✗ Botão não encontrado', 'error');
                return;
            }
            
            const hasThemeToggle = btn.classList.contains('theme-toggle-pill-active');
            if (hasThemeToggle) {
                log(`✓ Classe 'theme-toggle-pill-active' detectada`, 'success');
            } else {
                log(`⚠ Classe 'theme-toggle-pill-active' NÃO encontrada`, 'error');
            }
            
            const compStyle = getComputedStyle(btn);
            log(`  - Width (CSS): ${compStyle.width}`, 'info');
            log(`  - Height (CSS): ${compStyle.height}`, 'info');
            log(`  - Background: ${compStyle.backgroundColor}`, 'info');
            log(`  - Border-radius: ${compStyle.borderRadius}`, 'info');
        }
        
        function clearConsole() {
            document.getElementById('debugConsole').innerHTML = '';
            log('[CONSOLE LIMPO]', 'info');
        }
        
        // Teste na inicialização
        document.addEventListener('DOMContentLoaded', () => {
            log('→ DOMContentLoaded disparado', 'info');
            
            const btn = document.getElementById('darkModeToggle');
            if (btn) {
                log(`✓ Botão #darkModeToggle encontrado no DOM`, 'success');
            } else {
                log(`✗ Botão #darkModeToggle NÃO encontrado no DOM`, 'error');
            }
        });
        
        // Depois que o dark-mode.js carregar
        window.addEventListener('load', () => {
            log('→ Window load disparado', 'info');
            
            setTimeout(() => {
                const btn = document.getElementById('darkModeToggle');
                if (btn && btn.classList.contains('theme-toggle-pill-active')) {
                    log(`✓ dark-mode.js MODIFICOU o botão com sucesso`, 'success');
                    log(`  innerHTML agora contém: sun icon + slider + moon icon`, 'success');
                } else {
                    log(`⚠ dark-mode.js pode não ter rodado ou botão não foi encontrado`, 'error');
                }
            }, 500);
        });
    </script>
    
    <!-- Script do Dark Mode (deve rodar antes do window load) -->
    <script src="dark-mode.js"></script>
</body>
</html>

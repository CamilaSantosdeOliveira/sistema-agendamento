<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Teste Certificados Reais</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #3b82f6;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .certificados-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .certificado-card {
            background: #f8f9fa;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        
        .certificado-card:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
        }
        
        .certificado-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .certificado-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }
        
        .certificado-info h4 {
            color: #1e293b;
            margin: 0 0 5px 0;
        }
        
        .certificado-aluno {
            color: #64748b;
            font-size: 0.9rem;
        }
        
        .certificado-details {
            margin-bottom: 15px;
        }
        
        .certificado-details p {
            margin: 5px 0;
            color: #64748b;
            font-size: 0.9rem;
        }
        
        .certificado-details strong {
            color: #374151;
        }
        
        .test-btn {
            background: #3b82f6;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
            transition: all 0.3s ease;
        }
        
        .test-btn:hover {
            background: #2563eb;
        }
        
        .test-btn.success {
            background: #10b981;
        }
        
        .test-btn.success:hover {
            background: #059669;
        }
        
        .result {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
            border-left: 4px solid #3b82f6;
        }
        
        .result.success {
            border-left-color: #10b981;
            background: #d1fae5;
        }
        
        .result.error {
            border-left-color: #ef4444;
            background: #fee2e2;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 10px;
        }
        
        .status-emitido {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .status-validado {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-revogado {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 Teste Certificados Reais</h1>
            <p>Teste os certificados disponíveis na API</p>
        </div>

        <div class="certificados-grid" id="certificadosGrid">
            <!-- Certificados serão carregados aqui -->
        </div>

        <div id="result" class="result" style="display: none;"></div>
    </div>

    <script>
        const certificadosDisponiveis = [
            { id: 1, nome: 'João Silva', curso: 'Programação Web' },
            { id: 2, nome: 'Maria Santos', curso: 'Design Gráfico' },
            { id: 3, nome: 'Pedro Oliveira', curso: 'Marketing Digital' }
        ];

        function mostrarResultado(data, isSuccess = true) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result ${isSuccess ? 'success' : 'error'}`;
            resultDiv.textContent = JSON.stringify(data, null, 2);
            resultDiv.style.display = 'block';
        }

        async function testarCertificado(id) {
            try {
                const response = await fetch(`api/certificados.php?action=ver_certificado&id=${id}`);
                const result = await response.json();
                
                if (result.success) {
                    mostrarResultado({
                        teste: `Certificado ID ${id}`,
                        status: 'SUCESSO',
                        certificado: result.data
                    }, true);
                } else {
                    mostrarResultado({
                        teste: `Certificado ID ${id}`,
                        status: 'ERRO',
                        erro: result.message
                    }, false);
                }
            } catch (error) {
                mostrarResultado({
                    teste: `Certificado ID ${id}`,
                    status: 'ERRO',
                    erro: error.message
                }, false);
            }
        }

        async function testarCertificadoInexistente() {
            try {
                const response = await fetch('api/certificados.php?action=ver_certificado&id=999');
                const result = await response.json();
                
                if (!result.success) {
                    mostrarResultado({
                        teste: 'Certificado Inexistente (ID 999)',
                        status: 'SUCESSO - Erro esperado',
                        mensagem: result.message
                    }, true);
                } else {
                    mostrarResultado({
                        teste: 'Certificado Inexistente (ID 999)',
                        status: 'ERRO - Deveria retornar erro',
                        resultado: result
                    }, false);
                }
            } catch (error) {
                mostrarResultado({
                    teste: 'Certificado Inexistente (ID 999)',
                    status: 'ERRO',
                    erro: error.message
                }, false);
            }
        }

        function criarCardCertificado(certificado) {
            return `
                <div class="certificado-card">
                    <div class="status-badge status-emitido">Emitido</div>
                    <div class="certificado-header">
                        <div class="certificado-icon">
                            <i class="fas fa-certificate"></i>
                        </div>
                        <div class="certificado-info">
                            <h4>${certificado.nome}</h4>
                            <div class="certificado-aluno">${certificado.curso}</div>
                        </div>
                    </div>
                    <div class="certificado-details">
                        <p><strong>ID:</strong> ${certificado.id}</p>
                        <p><strong>Status:</strong> Emitido</p>
                    </div>
                    <div>
                        <button class="test-btn" onclick="testarCertificado(${certificado.id})">
                            👁️ Ver Certificado
                        </button>
                        <button class="test-btn success" onclick="testarDownload(${certificado.id})">
                            📥 Testar Download
                        </button>
                    </div>
                </div>
            `;
        }

        async function testarDownload(id) {
            try {
                const response = await fetch(`api/certificados.php?action=baixar_certificado&id=${id}`);
                const result = await response.json();
                
                if (result.success) {
                    mostrarResultado({
                        teste: `Download Certificado ID ${id}`,
                        status: 'SUCESSO',
                        dados: result.data
                    }, true);
                } else {
                    mostrarResultado({
                        teste: `Download Certificado ID ${id}`,
                        status: 'ERRO',
                        erro: result.message
                    }, false);
                }
            } catch (error) {
                mostrarResultado({
                    teste: `Download Certificado ID ${id}`,
                    status: 'ERRO',
                    erro: error.message
                }, false);
            }
        }

        function carregarCertificados() {
            const grid = document.getElementById('certificadosGrid');
            grid.innerHTML = '';
            
            certificadosDisponiveis.forEach(certificado => {
                grid.innerHTML += criarCardCertificado(certificado);
            });
            
            // Adicionar botão para testar certificado inexistente
            grid.innerHTML += `
                <div class="certificado-card">
                    <div class="status-badge status-revogado">Inexistente</div>
                    <div class="certificado-header">
                        <div class="certificado-icon">
                            <i class="fas fa-question"></i>
                        </div>
                        <div class="certificado-info">
                            <h4>Certificado Inexistente</h4>
                            <div class="certificado-aluno">ID: 999</div>
                        </div>
                    </div>
                    <div class="certificado-details">
                        <p><strong>ID:</strong> 999</p>
                        <p><strong>Status:</strong> Não encontrado</p>
                    </div>
                    <div>
                        <button class="test-btn" onclick="testarCertificadoInexistente()">
                            ⚠️ Testar Erro
                        </button>
                    </div>
                </div>
            `;
        }

        // Carregar certificados ao iniciar
        window.onload = function() {
            carregarCertificados();
        };
    </script>
</body>
</html>

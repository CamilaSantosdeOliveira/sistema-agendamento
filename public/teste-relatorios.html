<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste - Relatórios</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        
        .reports-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .report-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }
        
        .report-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .report-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
            display: block;
        }
        
        .cursos .report-icon { color: #007bff; }
        .usuarios .report-icon { color: #28a745; }
        .financeiro .report-icon { color: #ffc107; }
        .agendamentos .report-icon { color: #17a2b8; }
        
        .report-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        
        .report-description {
            color: #666;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        
        .report-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s ease;
        }
        
        .report-btn:hover {
            background: #0056b3;
        }
        
        .cursos .report-btn { background: #007bff; }
        .cursos .report-btn:hover { background: #0056b3; }
        
        .usuarios .report-btn { background: #28a745; }
        .usuarios .report-btn:hover { background: #1e7e34; }
        
        .financeiro .report-btn { background: #ffc107; }
        .financeiro .report-btn:hover { background: #e0a800; }
        
        .agendamentos .report-btn { background: #17a2b8; }
        .agendamentos .report-btn:hover { background: #138496; }
        
        .result {
            background: #e9ecef;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .back-btn {
            background: #6c757d;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 20px;
        }
        
        .back-btn:hover {
            background: #545b62;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="sistema_final.html" class="back-btn">← Voltar ao Sistema</a>
        
        <h1>📊 Teste - Relatórios Disponíveis</h1>
        
        <div class="reports-grid">
            <!-- Relatório de Cursos -->
            <div class="report-card cursos">
                <span class="report-icon">📚</span>
                <h3 class="report-title">Relatório de Cursos</h3>
                <p class="report-description">Análise completa dos cursos</p>
                <button class="report-btn" onclick="testarBotao('cursos')">
                    Gerar Relatório
                </button>
            </div>

            <!-- Relatório de Usuários -->
            <div class="report-card usuarios">
                <span class="report-icon">👥</span>
                <h3 class="report-title">Relatório de Usuários</h3>
                <p class="report-description">Estatísticas dos usuários</p>
                <button class="report-btn" onclick="testarBotao('usuarios')">
                    Gerar Relatório
                </button>
            </div>

            <!-- Relatório Financeiro -->
            <div class="report-card financeiro">
                <span class="report-icon">💰</span>
                <h3 class="report-title">Relatório Financeiro</h3>
                <p class="report-description">Análise financeira</p>
                <button class="report-btn" onclick="testarBotao('financeiro')">
                    Gerar Relatório
                </button>
            </div>

            <!-- Relatório de Agendamentos -->
            <div class="report-card agendamentos">
                <span class="report-icon">📅</span>
                <h3 class="report-title">Relatório de Agendamentos</h3>
                <p class="report-description">Análise de aulas</p>
                <button class="report-btn" onclick="testarBotao('agendamentos')">
                    Gerar Relatório
                </button>
            </div>
        </div>

        <div class="result" id="resultado">
            Clique em um dos botões acima para testar
        </div>
    </div>

    <script>
        function testarBotao(tipo) {
            const resultado = document.getElementById('resultado');
            
            // Mostrar loading
            resultado.innerHTML = '⏳ Gerando relatório...';
            
            // Simular processamento
            setTimeout(() => {
                const relatorios = {
                    'cursos': {
                        titulo: '📚 Relatório de Cursos',
                        dados: {
                            'Cursos Ativos': '156',
                            'Taxa de Conclusão': '87.5%',
                            'Avaliação Média': '4.7/5.0',
                            'Total de Matrículas': '1,234'
                        }
                    },
                    'usuarios': {
                        titulo: '👥 Relatório de Usuários',
                        dados: {
                            'Total de Usuários': '1,234',
                            'Usuários Ativos': '892',
                            'Novos Este Mês': '342',
                            'Taxa de Retenção': '72%'
                        }
                    },
                    'financeiro': {
                        titulo: '💰 Relatório Financeiro',
                        dados: {
                            'Receita Total': 'R$ 45.678',
                            'Despesas': 'R$ 12.345',
                            'Lucro Líquido': 'R$ 33.333',
                            'Margem de Lucro': '73%'
                        }
                    },
                    'agendamentos': {
                        titulo: '📅 Relatório de Agendamentos',
                        dados: {
                            'Total de Agendamentos': '2,567',
                            'Este Mês': '156',
                            'Taxa de Ocupação': '89%',
                            'Duração Média': '4.2h'
                        }
                    }
                };
                
                const relatorio = relatorios[tipo];
                let html = `<h3>${relatorio.titulo}</h3><div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 15px;">`;
                
                for (const [chave, valor] of Object.entries(relatorio.dados)) {
                    html += `
                        <div style="background: #f8f9fa; padding: 10px; border-radius: 5px; text-align: center;">
                            <div style="font-weight: bold; color: #007bff;">${valor}</div>
                            <div style="font-size: 0.9rem; color: #666;">${chave}</div>
                        </div>
                    `;
                }
                
                html += '</div>';
                html += '<button onclick="exportarRelatorio(\'' + tipo + '\')" style="background: #28a745; color: white; border: none; padding: 8px 16px; border-radius: 5px; margin-top: 15px; cursor: pointer;">📥 Exportar PDF</button>';
                
                resultado.innerHTML = html;
            }, 1500);
        }
        
        function exportarRelatorio(tipo) {
            alert(`✅ Relatório de ${tipo} exportado com sucesso!`);
        }
    </script>
</body>
</html>

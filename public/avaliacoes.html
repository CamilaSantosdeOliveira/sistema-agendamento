<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliar Aulas - EduConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
        }
        
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 15px 0;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            border-radius: 0 0 20px 20px;
            margin: -20px -20px 30px -20px;
        }
        
        .nav-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
        }
        
        .nav-logo {
            font-size: 1.8em;
            font-weight: bold;
            color: #1e40af;
            text-decoration: none;
        }
        
        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
        }
        
        .nav-links a {
            text-decoration: none;
            color: #374151;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 20px;
        }
        
        .nav-links a:hover {
            color: #1e40af;
            background: rgba(30, 64, 175, 0.1);
            transform: translateY(-2px);
        }
        
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            backdrop-filter: blur(20px);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #f59e0b 100%);
            padding: 50px 30px;
            text-align: center;
            color: white;
        }
        
        h1 { 
            font-size: 3em; 
            margin-bottom: 15px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            font-size: 1.3em;
            opacity: 0.95;
            font-weight: 300;
        }
        
        .content {
            padding: 50px 30px;
        }
        
        .section {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            margin-bottom: 40px;
            border: 1px solid rgba(0,0,0,0.05);
        }
        
        .section h2 {
            color: #1e40af;
            margin-bottom: 30px;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .aula-card {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            border-left: 5px solid #1e40af;
            transition: all 0.3s ease;
        }
        
        .aula-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        
        .aula-info {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .aula-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }
        
        .aula-detail {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95em;
            color: #374151;
        }
        
        .avaliar-btn {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }
        
        .avaliar-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.4);
        }
        
        .avaliacao-form {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #e5e7eb;
            margin-top: 20px;
            display: none;
        }
        
        .avaliacao-form.ativo {
            display: block;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .estrelas {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            justify-content: center;
        }
        
        .estrela {
            font-size: 2.5em;
            color: #d1d5db;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }
        
        .estrela:hover,
        .estrela.ativa {
            color: #fbbf24;
            transform: scale(1.1);
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 12px;
            font-weight: 600;
            color: #1f2937;
        }
        
        textarea {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
            transition: all 0.3s ease;
        }
        
        textarea:focus {
            outline: none;
            border-color: #1e40af;
            box-shadow: 0 0 0 4px rgba(30, 64, 175, 0.1);
        }
        
        .enviar-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            width: 100%;
        }
        
        .enviar-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }
        
        .avaliacao-existente {
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid #10b981;
            margin-top: 20px;
        }
        
        .nota-display {
            display: flex;
            gap: 5px;
            margin: 10px 0;
        }
        
        .estrela-display {
            color: #fbbf24;
            font-size: 1.2em;
        }
        
        .success, .error {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: center;
        }
        
        .success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }
        
        .error {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }
        
        .empty-state .icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }
            
            .content {
                padding: 20px;
            }
            
            .section {
                padding: 20px;
            }
            
            .aula-info {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .aula-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">🎓 EduConnect</a>
            <div class="nav-links">
                <a href="index.html">🏠 Início</a>
                <a href="busca.html">🔍 Buscar</a>
                <a href="login.html">🔑 Login</a>
                <a href="sistema_final.html">📅 Agendar</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1>⭐ Avaliar Aulas</h1>
            <p class="subtitle">Avalie suas experiências e ajude outros alunos</p>
        </div>
        
        <div class="content">
            <div class="section">
                <h2>📚 Aulas para Avaliar</h2>
                <div id="aulas-avaliar">
                    <div class="empty-state">
                        <div class="icon">⏳</div>
                        <p>Carregando aulas concluídas...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let aulasData = [];
        
        // Carregar aulas concluídas
        async function carregarAulas() {
            try {
                const response = await fetch('avaliacoes_api.php?aulas_concluidas=1');
                aulasData = await response.json();
                exibirAulas();
            } catch (error) {
                document.getElementById('aulas-avaliar').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">❌</div>
                        <p>Erro ao carregar aulas</p>
                        <small>Verifique sua conexão</small>
                    </div>
                `;
            }
        }
        
        // Exibir aulas
        function exibirAulas() {
            const container = document.getElementById('aulas-avaliar');
            
            if (aulasData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📚</div>
                        <p>Nenhuma aula para avaliar</p>
                        <small>Complete algumas aulas primeiro!</small>
                    </div>
                `;
                return;
            }
            
            let html = '';
            aulasData.forEach(aula => {
                const data = new Date(aula.data + 'T00:00:00').toLocaleDateString('pt-BR');
                const materiaIcons = {
                    'matematica': '🔢', 'portugues': '📝', 'ingles': '🇺🇸',
                    'fisica': '⚛️', 'quimica': '🧪', 'biologia': '🧬',
                    'historia': '📚', 'geografia': '🌍', 'filosofia': '💭',
                    'sociologia': '👥', 'redacao': '✍️', 'informatica': '💻'
                };
                const icon = materiaIcons[aula.servico] || '📖';
                
                if (aula.avaliacao_id) {
                    // Já avaliada
                    const estrelas = '★'.repeat(aula.nota) + '☆'.repeat(5 - aula.nota);
                    html += `
                        <div class="aula-card">
                            <div class="aula-info">
                                <div class="aula-details">
                                    <div class="aula-detail"><strong>👤 Aluno: ${aula.nome}</strong></div>
                                    <div class="aula-detail">👨‍🏫 Professor: ${aula.professor}</div>
                                    <div class="aula-detail">📅 ${data}</div>
                                    <div class="aula-detail">⏰ ${aula.hora}</div>
                                    <div class="aula-detail">${icon} ${aula.servico}</div>
                                </div>
                                <div style="text-align: center;">
                                    <div style="color: #10b981; font-weight: bold;">✅ Avaliada</div>
                                </div>
                            </div>
                            <div class="avaliacao-existente">
                                <div class="nota-display">
                                    <span>Nota: </span>
                                    ${estrelas.split('').map(s => `<span class="estrela-display">${s}</span>`).join('')}
                                </div>
                                <p><strong>Comentário:</strong></p>
                                <p style="font-style: italic; margin-top: 8px;">"${aula.comentario || 'Sem comentário'}"</p>
                            </div>
                        </div>
                    `;
                } else {
                    // Pendente de avaliação
                    html += `
                        <div class="aula-card">
                            <div class="aula-info">
                                <div class="aula-details">
                                    <div class="aula-detail"><strong>👤 Aluno: ${aula.nome}</strong></div>
                                    <div class="aula-detail">👨‍🏫 Professor: ${aula.professor}</div>
                                    <div class="aula-detail">📅 ${data}</div>
                                    <div class="aula-detail">⏰ ${aula.hora}</div>
                                    <div class="aula-detail">${icon} ${aula.servico}</div>
                                </div>
                                <button onclick="abrirAvaliacao(${aula.id})" class="avaliar-btn">
                                    ⭐ Avaliar Aula
                                </button>
                            </div>
                            <div id="form-${aula.id}" class="avaliacao-form">
                                <h3 style="text-align: center; color: #1e40af; margin-bottom: 20px;">
                                    ⭐ Como foi sua aula?
                                </h3>
                                
                                <div class="form-group">
                                    <label style="text-align: center;">Dê uma nota de 1 a 5 estrelas:</label>
                                    <div class="estrelas" data-aula="${aula.id}">
                                        <span class="estrela" data-nota="1">★</span>
                                        <span class="estrela" data-nota="2">★</span>
                                        <span class="estrela" data-nota="3">★</span>
                                        <span class="estrela" data-nota="4">★</span>
                                        <span class="estrela" data-nota="5">★</span>
                                    </div>
                                </div>
                                
                                <div class="form-group">
                                    <label>Deixe um comentário sobre a aula:</label>
                                    <textarea id="comentario-${aula.id}" 
                                              placeholder="Como foi a didática do professor? O conteúdo foi bem explicado? Recomendaria para outros alunos?"></textarea>
                                </div>
                                
                                <button onclick="enviarAvaliacao(${aula.id}, '${aula.nome}', '${aula.professor}')" 
                                        class="enviar-btn">
                                    📤 Enviar Avaliação
                                </button>
                                
                                <div id="resultado-${aula.id}"></div>
                            </div>
                        </div>
                    `;
                }
            });
            
            container.innerHTML = html;
            configurarEstrelas();
        }
        
        // Abrir formulário de avaliação
        function abrirAvaliacao(aulaId) {
            const form = document.getElementById(`form-${aulaId}`);
            form.classList.add('ativo');
        }
        
        // Configurar sistema de estrelas
        function configurarEstrelas() {
            document.querySelectorAll('.estrelas').forEach(container => {
                const estrelas = container.querySelectorAll('.estrela');
                let notaSelecionada = 0;
                
                estrelas.forEach(estrela => {
                    estrela.addEventListener('click', () => {
                        notaSelecionada = parseInt(estrela.dataset.nota);
                        container.dataset.nota = notaSelecionada;
                        
                        estrelas.forEach((e, index) => {
                            if (index < notaSelecionada) {
                                e.classList.add('ativa');
                            } else {
                                e.classList.remove('ativa');
                            }
                        });
                    });
                    
                    estrela.addEventListener('mouseenter', () => {
                        const nota = parseInt(estrela.dataset.nota);
                        estrelas.forEach((e, index) => {
                            if (index < nota) {
                                e.style.color = '#fbbf24';
                            } else {
                                e.style.color = '#d1d5db';
                            }
                        });
                    });
                });
                
                container.addEventListener('mouseleave', () => {
                    estrelas.forEach((e, index) => {
                        if (index < notaSelecionada) {
                            e.style.color = '#fbbf24';
                        } else {
                            e.style.color = '#d1d5db';
                        }
                    });
                });
            });
        }
        
        // Enviar avaliação
        async function enviarAvaliacao(aulaId, alunoNome, professorNome) {
            const container = document.querySelector(`[data-aula="${aulaId}"]`);
            const nota = parseInt(container.dataset.nota || 0);
            const comentario = document.getElementById(`comentario-${aulaId}`).value;
            const resultado = document.getElementById(`resultado-${aulaId}`);
            
            if (nota === 0) {
                resultado.innerHTML = '<div class="error">⚠️ Por favor, selecione uma nota!</div>';
                return;
            }
            
            try {
                const response = await fetch('avaliacoes_api.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        agendamento_id: aulaId,
                        aluno_nome: alunoNome,
                        professor_nome: professorNome,
                        nota: nota,
                        comentario: comentario
                    })
                });
                
                const result = await response.json();
                
                if (result.sucesso) {
                    resultado.innerHTML = '<div class="success">🎉 Avaliação enviada com sucesso!</div>';
                    setTimeout(() => {
                        carregarAulas(); // Recarregar para mostrar a avaliação
                    }, 2000);
                } else {
                    resultado.innerHTML = `<div class="error">❌ ${result.mensagem}</div>`;
                }
            } catch (error) {
                resultado.innerHTML = '<div class="error">❌ Erro de conexão</div>';
            }
        }
        
        // Inicializar
        window.onload = carregarAulas;
    </script>
</body>
</html>

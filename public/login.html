<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduConnect - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .logo {
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-size: 32px;
            color: #3b82f6;
            margin-bottom: 10px;
        }
        
        .logo p {
            color: #64748b;
            font-size: 16px;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        
        .demo-accounts {
            background: #f8fafc;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .demo-accounts h3 {
            color: #374151;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .demo-account {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .demo-account:hover {
            border-color: #3b82f6;
            background: #f0f9ff;
        }
        
        .demo-account .role {
            font-weight: 600;
            color: #3b82f6;
            font-size: 12px;
        }
        
        .demo-account .credentials {
            color: #6b7280;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            
            .logo h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🎓 EduConnect Tech</h1>
            <p>Sistema de Agendamento</p>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" required placeholder="Digite seu usuário">
            </div>
            
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" required placeholder="Digite sua senha">
            </div>
            
            <button type="submit" class="login-btn">🚀 Entrar no Sistema</button>
        </form>
        
        <div class="demo-accounts">
            <h3>📋 Conta de Demonstração</h3>
            
            <div class="demo-account" onclick="fillCredentials('admin', 'admin123')">
                <div class="role">👨‍💼 Administrador</div>
                <div class="credentials">admin / admin123</div>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Simular autenticação
            if (authenticateUser(username, password)) {
                // Salvar dados do usuário
                const userData = getUserData(username);
                localStorage.setItem('userData', JSON.stringify(userData));
                
                // Criar sessão PHP
                fetch('create_session.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        userData: userData
                    })
                }).then(() => {
                    // Redirecionar para o dashboard
                    window.location.href = 'dashboard_final.php';
                });
            } else {
                showError('Usuário ou senha incorretos!');
            }
        });
        
        function authenticateUser(username, password) {
            const validUsers = {
                'admin': 'admin123'
            };
            
            return validUsers[username] === password;
        }
        
        function getUserData(username) {
            const userData = {
                'admin': {
                    name: 'Administrador',
                    role: 'admin',
                    permissions: ['all']
                }
            };
            
            return userData[username] || {};
        }
        
        function fillCredentials(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }
        
        // Verificar se já está logado
        if (localStorage.getItem('userData')) {
            window.location.href = 'dashboard_final.php';
        }
    </script>
</body>
</html>
